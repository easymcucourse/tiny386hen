[esp]
; WIFI config
ssid =
pass =

; USB Host HID input (1=enable, 0=disable)
enable_usb = 1

; I2S output volume percent (0-100)
volume = 10

[pc]
bios = flash:bios.bin
vga_bios = flash:vgabios.bin
mem_size = 4096K
vga_mem_size = 320K
; fdX hdX cdX
hda = sdspi:raw
fill_cmos = 1
; force 8-dot text mode so 80-col text (640px) fits in the 320px logical frame
vga_force_8dm = 1

[display]
width = 320
height = 240

[cpu]
gen = 3
fpu = 1

[jit]
; Runtime JIT gates for DOSBENCH opcode experiments.
; Defaults match the firmware build when keys are omitted.
; level = 3
; only_opcode = -1
; push_imm8 = 0
; mem_helpers = 0
; inline_mem = 0
; stack_fastpath = 0
; cmptest_jcc = 1
; mov_ri = 1
; mov_rr = 1
; jmp = 1
;
; NOJIT DOSBENCH baseline:
; level = 0
;
; Single-opcode PUSH imm8 helper test:
; level = 3
; only_opcode = 0x6A
; push_imm8 = 1
; mem_helpers = 1
;
; Single-opcode DEC EDX test:
; level = 3
; only_opcode = 0x4A
