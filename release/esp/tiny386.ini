[esp]
; WIFI config
ssid =
pass =

; USB Host HID input (1=enable, 0=disable)
enable_usb = 1

; I2S output volume percent (0-100)
volume = 10

[pc]
bios = flash:bios.bin
vga_bios = flash:vgabios.bin
mem_size = 4096K
vga_mem_size = 320K
; fdX hdX cdX
hda = sdspi:raw
fill_cmos = 1
; force 8-dot text mode so 80-col text (640px) fits in the 320px logical frame
vga_force_8dm = 1

[display]
width = 320
height = 240

[cpu]
gen = 3
fpu = 1
